<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Espace Gérant — Médin'Immersion</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="https://pub-629428d185ca4960a0a73c850d32294b.r2.dev/company_83078/images/933a6647-1e04-4982-bc9f-b6d67608ce89.png">
<style>
:root{--green-deep:#0F3D26;--green:#1B5E3A;--green-soft:#226C44;--gold:#B8953A;--gold-light:#D4A843;--gold-pale:#F0E0A8;--cream:#FDFAF3;--cream-2:#F5EFDD;--beige:#E7DCBE;--text:#1A1A1A;--muted:#5A5247;--white:#fff;--ok:#1E8E54;--okbg:#E6F4EC;--warn:#C08A18;--warnbg:#FBF1D8;--bad:#C0392B;--badbg:#FBE9E7;--info:#2563A8;--infobg:#E7F0FB;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--cream);}
.ar{font-family:'Amiri',serif;}
a{color:inherit;}
.top{background:var(--green-deep);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0.7rem 1rem;position:sticky;top:0;z-index:30;}
.top .brand{display:flex;align-items:center;gap:0.55rem;}
.top .brand img{height:30px;background:#fff;border-radius:7px;padding:3px 6px;}
.top .brand b{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;}
.top .brand b span{color:var(--gold-light);}
.logout{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-family:inherit;font-size:0.8rem;font-weight:600;padding:0.45rem 0.9rem;border-radius:50px;cursor:pointer;}
.logout:hover{background:rgba(255,255,255,0.18);}
.wrap{max-width:1100px;margin:0 auto;padding:1rem;}
.tabs{display:flex;gap:0.4rem;overflow-x:auto;padding-bottom:0.4rem;margin-bottom:1rem;-webkit-overflow-scrolling:touch;}
.tab{flex:0 0 auto;background:#fff;border:1px solid var(--beige);color:var(--muted);font-family:inherit;font-size:0.8rem;font-weight:600;padding:0.55rem 0.95rem;border-radius:50px;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.tab.on{background:var(--green);border-color:var(--green);color:#fff;}
.tab.gold.on{background:var(--gold);border-color:var(--gold);color:var(--green-deep);}
.panel{display:none;background:#fff;border:1px solid var(--beige);border-radius:16px;padding:1.1rem;}
.panel.on{display:block;animation:fade 0.2s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.panel h2{font-family:'Cormorant Garamond',serif;color:var(--green-deep);font-size:1.5rem;margin-bottom:0.2rem;}
.panel .sub{color:var(--muted);font-size:0.85rem;margin-bottom:1rem;}
.row{border:1px solid var(--beige);border-radius:12px;padding:0.85rem;margin-bottom:0.7rem;background:var(--cream);}
.row .r-top{display:flex;justify-content:space-between;align-items:flex-start;gap:0.6rem;}
.row .name{font-weight:700;font-size:0.98rem;color:var(--green-deep);}
.row .meta{font-size:0.78rem;color:var(--muted);margin-top:0.2rem;line-height:1.5;}
.badge{font-size:0.68rem;font-weight:700;padding:0.22rem 0.6rem;border-radius:50px;white-space:nowrap;}
.b-ok{background:var(--okbg);color:var(--ok);}
.b-info{background:var(--infobg);color:var(--info);}
.b-bad{background:var(--badbg);color:var(--bad);}
.acts{display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.7rem;}
.btn{font-family:inherit;font-size:0.76rem;font-weight:600;padding:0.45rem 0.8rem;border-radius:8px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:0.3rem;}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{background:var(--green-deep);}
.btn-gold{background:var(--gold);color:var(--green-deep);}.btn-gold:hover{background:var(--gold-light);}
.btn-soft{background:#fff;border:1px solid var(--beige);color:var(--text);}
.btn-bad{background:var(--badbg);color:var(--bad);}
.empty{text-align:center;color:var(--muted);font-size:0.88rem;padding:2rem 1rem;}
.loading{text-align:center;color:var(--muted);font-size:0.85rem;padding:1.5rem;}
.form-group{margin-bottom:1rem;}
.form-group label{display:block;font-weight:600;font-size:0.85rem;color:var(--green-deep);margin-bottom:0.4rem;}
.form-group input,.form-group select{width:100%;padding:0.7rem;border:1.5px solid var(--beige);border-radius:8px;font-family:inherit;font-size:0.9rem;}
.form-group input:focus,.form-group select:focus{outline:2px solid var(--gold);border-color:var(--gold);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:50;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-box{background:#fff;border-radius:16px;padding:1.5rem;width:90%;max-width:600px;max-height:90vh;overflow-y:auto;}
.modal-close{float:right;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted);}
.toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--green-deep);color:#fff;padding:0.7rem 1.2rem;border-radius:50px;font-size:0.85rem;font-weight:600;z-index:100;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
.toast.error{background:var(--bad);}
.cover-preview{width:100%;max-width:150px;height:auto;border-radius:8px;border:1px solid var(--beige);margin-top:0.5rem;}
.file-input-label{display:block;background:var(--cream-2);border:2px dashed var(--beige);border-radius:8px;padding:1rem;text-align:center;cursor:pointer;transition:all 0.2s;}
.file-input-label:hover{border-color:var(--gold);background:var(--gold-pale);}
.file-input-label input{display:none;}
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <img src="https://pub-629428d185ca4960a0a73c850d32294b.r2.dev/company_83078/images/933a6647-1e04-4982-bc9f-b6d67608ce89.png" alt="">
    <b>Espace <span>Gérant</span></b>
  </div>
  <button class="logout" id="logoutBtn">Déconnexion</button>
</div>

<div class="wrap" id="app">

  <div class="tabs">
    <button class="tab gold on" data-p="livres">📚 Livres & Couvertures</button>
    <button class="tab" data-p="settings">⚙️ Paramètres</button>
  </div>

  <!-- Panel Livres -->
  <div class="panel on" id="p-livres">
    <h2>Livres & Couvertures</h2>
    <p class="sub">Gère les couvertures de tes niveaux et modifie les détails des documents.</p>
    
    <button class="btn btn-green" onclick="openAddBookModal()" style="margin-bottom:1rem;">➕ Ajouter un livre</button>
    
    <div id="listBoutique" class="loading">Chargement…</div>
  </div>

  <!-- Panel Paramètres -->
  <div class="panel" id="p-settings">
    <h2>Paramètres</h2>
    <p class="sub">Configure les dossiers et emplacements des documents.</p>
    
    <div class="form-group">
      <label>Dossier racine des couvertures (GitHub)</label>
      <input type="text" id="coverFolder" value="/images/livres/" placeholder="/images/livres/">
      <small style="color:var(--muted);margin-top:0.3rem;display:block;">Chemin relatif au repo GitHub. Exemple: /images/livres/</small>
    </div>
    
    <button class="btn btn-green" onclick="saveSettings()">💾 Enregistrer</button>
  </div>

</div>

<!-- Modal Ajouter Livre -->
<div class="modal-overlay" id="addBookModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAddBookModal()">✕</button>
    <h2 style="color:var(--green-deep);margin-bottom:1rem;">Ajouter un livre</h2>
    
    <div class="form-group">
      <label>Niveau</label>
      <select id="addLevel">
        <option value="">-- Choisir --</option>
        <option value="1">Niveau 1</option>
        <option value="2">Niveau 2</option>
        <option value="3">Niveau 3</option>
        <option value="4">Niveau 4</option>
        <option value="5">Niveau 5</option>
        <option value="6">Niveau 6</option>
        <option value="7">Niveau 7</option>
        <option value="8">Niveau 8</option>
        <option value="9">Niveau 9</option>
        <option value="10">Niveau 10</option>
        <option value="11">Niveau 11</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>Nom du document</label>
      <input type="text" id="addName" placeholder="Ex: Niveau 1 - Introduction">
    </div>
    
    <div class="form-group">
      <label>Prix (€)</label>
      <input type="number" id="addPrice" placeholder="10" min="0" step="0.01" value="10">
    </div>
    
    <div class="form-group">
      <label>Couverture</label>
      <label class="file-input-label">
        <span id="fileLabel">📤 Clique pour uploader une image</span>
        <input type="file" id="addCover" accept="image/*" onchange="previewCover()">
      </label>
      <img id="coverPreview" class="cover-preview" style="display:none;">
      <small id="coverInfo" style="color:var(--muted);margin-top:0.3rem;display:block;"></small>
    </div>
    
    <div style="display:flex;gap:0.5rem;">
      <button class="btn btn-green" onclick="saveNewBook()">✓ Ajouter</button>
      <button class="btn btn-soft" onclick="closeAddBookModal()">Annuler</button>
    </div>
    <div id="addBookMsg" style="font-size:0.85rem;margin-top:0.7rem;"></div>
  </div>
</div>

<!-- Modal Éditer Livre -->
<div class="modal-overlay" id="editBookModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeEditModal()">✕</button>
    <h2 style="color:var(--green-deep);margin-bottom:1rem;">Éditer le livre</h2>
    
    <div class="form-group">
      <label>Nom du document</label>
      <input type="text" id="editName" placeholder="Ex: Niveau 1 - Introduction">
    </div>
    
    <div class="form-group">
      <label>Prix (€)</label>
      <input type="number" id="editPrice" placeholder="10" min="0" step="0.01">
    </div>
    
    <div class="form-group">
      <label>Couverture actuelle</label>
      <img id="editCoverPreview" class="cover-preview" style="display:none;">
      <small id="editCoverUrl" style="color:var(--muted);display:block;margin-top:0.5rem;word-break:break-all;"></small>
    </div>
    
    <div class="form-group">
      <label>Remplacer la couverture</label>
      <label class="file-input-label">
        <span>📤 Clique pour uploader une nouvelle image</span>
        <input type="file" id="editCover" accept="image/*" onchange="previewEditCover()">
      </label>
    </div>
    
    <div style="display:flex;gap:0.5rem;">
      <button class="btn btn-green" onclick="saveEditedBook()">✓ Enregistrer</button>
      <button class="btn btn-soft" onclick="closeEditModal()">Annuler</button>
    </div>
    <div id="editBookMsg" style="font-size:0.85rem;margin-top:0.7rem;"></div>
  </div>
</div>

<script>
let cacheBoutique=[];
let currentEditIndex=-1;
let currentEditFile=null;
let coverFolder='/images/livres/';

// Tabs
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    const panel=t.dataset.p;
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
    t.classList.add('on');
    document.getElementById('p-'+panel).classList.add('on');
  });
});

// Init
function init(){
  loadBoutique();
  loadSettings();
}

// Settings
function loadSettings(){
  const saved=localStorage.getItem('gerant_settings');
  if(saved){
    const s=JSON.parse(saved);
    coverFolder=s.coverFolder||'/images/livres/';
  }
  document.getElementById('coverFolder').value=coverFolder;
}

function saveSettings(){
  coverFolder=document.getElementById('coverFolder').value||'/images/livres/';
  localStorage.setItem('gerant_settings',JSON.stringify({coverFolder}));
  toast('✓ Paramètres enregistrés');
}

// Books
function loadBoutique(){
  const stored=localStorage.getItem('boutique_books');
  if(stored){
    cacheBoutique=JSON.parse(stored);
  }else{
    cacheBoutique=[
      {niveau:1,fr:'Niveau 1 - Introduction',price:10,img:'/images/livres/niveau-1.jpg'},
      {niveau:2,fr:'Niveau 2',price:10,img:'/images/livres/niveau-2.jpg'},
      {niveau:3,fr:'Niveau 3',price:10,img:'/images/livres/niveau-3.jpg'},
      {niveau:4,fr:'Niveau 4',price:10,img:'/images/livres/niveau-4.jpg'},
      {niveau:5,fr:'Niveau 5',price:10,img:'/images/livres/niveau-5.jpg'},
      {niveau:6,fr:'Niveau 6',price:10,img:'/images/livres/niveau-6.jpg'},
      {niveau:7,fr:'Niveau 7',price:10,img:'/images/livres/niveau-7.jpg'},
      {niveau:8,fr:'Niveau 8',price:10,img:'/images/livres/niveau-8.jpg'},
      {niveau:9,fr:'Niveau 9',price:10,img:'/images/livres/niveau-9.jpg'},
      {niveau:10,fr:'Niveau 10',price:10,img:'/images/livres/niveau-10.jpg'},
      {niveau:11,fr:'Niveau 11 - نهاية',price:10,img:'/images/livres/niveau-11.jpg'}
    ];
  }
  renderBoutique();
}

function renderBoutique(){
  if(!cacheBoutique.length){
    document.getElementById('listBoutique').innerHTML='<div class="empty">Aucun livre.</div>';
    return;
  }
  document.getElementById('listBoutique').innerHTML=cacheBoutique.map((b,idx)=>`
    <div class="row">
      <div class="r-top">
        <div style="flex:1;">
          <div class="name">Niveau ${b.niveau} - ${b.fr}</div>
          <div class="meta">${b.price}€</div>
          <img src="${b.img}" alt="${b.fr}" class="cover-preview" style="margin-top:0.5rem;">
        </div>
        <span class="badge b-info">${b.price}€</span>
      </div>
      <div class="acts">
        <button class="btn btn-gold" onclick="openEditModal(${idx})">✏️ Éditer</button>
        ${idx>0?'<button class="btn btn-soft" onclick="moveBook('+idx+',-1)">⬆️ Monter</button>':''}
        ${idx<cacheBoutique.length-1?'<button class="btn btn-soft" onclick="moveBook('+idx+',1)">⬇️ Descendre</button>':''}
        <button class="btn btn-bad" onclick="deleteBook(${idx})">🗑 Supprimer</button>
      </div>
    </div>
  `).join('');
}

// Modal Add Book
function openAddBookModal(){
  document.getElementById('addBookModal').classList.add('show');
  document.getElementById('addLevel').value='';
  document.getElementById('addName').value='';
  document.getElementById('addPrice').value='10';
  document.getElementById('addCover').value='';
  document.getElementById('coverPreview').style.display='none';
  document.getElementById('addBookMsg').textContent='';
}

function closeAddBookModal(){
  document.getElementById('addBookModal').classList.remove('show');
}

function previewCover(){
  const file=document.getElementById('addCover').files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    document.getElementById('coverPreview').src=e.target.result;
    document.getElementById('coverPreview').style.display='block';
    document.getElementById('coverInfo').textContent=`📁 ${file.name} (${(file.size/1024).toFixed(1)}KB)`;
  };
  reader.readAsDataURL(file);
}

async function saveNewBook(){
  const level=document.getElementById('addLevel').value;
  const name=document.getElementById('addName').value.trim();
  const price=parseInt(document.getElementById('addPrice').value);
  const file=document.getElementById('addCover').files[0];
  const msg=document.getElementById('addBookMsg');

  msg.textContent='Vérification...';
  msg.style.color='var(--muted)';

  if(!level||!name||!price){
    msg.textContent='❌ Tous les champs sont requis';
    msg.style.color='var(--bad)';
    return;
  }

  let imgUrl=`${coverFolder}niveau-${level}.jpg`;

  if(file){
    msg.textContent='📤 Conversion de l\'image...';
    const reader=new FileReader();
    reader.onload=(e)=>{
      imgUrl=e.target.result;
      addBookToStore(level,name,price,imgUrl,msg);
    };
    reader.readAsDataURL(file);
  }else{
    addBookToStore(level,name,price,imgUrl,msg);
  }
}

function addBookToStore(level,name,price,img,msg){
  const book={niveau:parseInt(level),fr:name,price:parseInt(price),img};
  cacheBoutique.push(book);
  cacheBoutique.sort((a,b)=>a.niveau-b.niveau);
  localStorage.setItem('boutique_books',JSON.stringify(cacheBoutique));
  msg.textContent='✓ Livre ajouté avec succès';
  msg.style.color='var(--ok)';
  setTimeout(()=>{
    closeAddBookModal();
    loadBoutique();
  },1000);
}

// Modal Edit Book
function openEditModal(idx){
  currentEditIndex=idx;
  const b=cacheBoutique[idx];
  document.getElementById('editName').value=b.fr;
  document.getElementById('editPrice').value=b.price;
  document.getElementById('editCoverPreview').src=b.img;
  document.getElementById('editCoverPreview').style.display='block';
  document.getElementById('editCoverUrl').textContent=`📄 ${b.img.substring(0,80)}...`;
  document.getElementById('editCover').value='';
  document.getElementById('editBookMsg').textContent='';
  document.getElementById('editBookModal').classList.add('show');
}

function closeEditModal(){
  document.getElementById('editBookModal').classList.remove('show');
  currentEditIndex=-1;
  currentEditFile=null;
}

function previewEditCover(){
  const file=document.getElementById('editCover').files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    currentEditFile=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveEditedBook(){
  const name=document.getElementById('editName').value.trim();
  const price=parseInt(document.getElementById('editPrice').value);
  const msg=document.getElementById('editBookMsg');

  if(!name||!price){
    msg.textContent='❌ Tous les champs sont requis';
    msg.style.color='var(--bad)';
    return;
  }

  cacheBoutique[currentEditIndex].name=name;
  cacheBoutique[currentEditIndex].price=price;
  
  if(currentEditFile){
    cacheBoutique[currentEditIndex].img=currentEditFile;
  }

  localStorage.setItem('boutique_books',JSON.stringify(cacheBoutique));
  msg.textContent='✓ Livre modifié avec succès';
  msg.style.color='var(--ok)';
  setTimeout(()=>{
    closeEditModal();
    loadBoutique();
  },1000);
}

function moveBook(idx,direction){
  const newIdx=idx+direction;
  if(newIdx<0||newIdx>=cacheBoutique.length) return;
  const temp=cacheBoutique[idx];
  cacheBoutique[idx]=cacheBoutique[newIdx];
  cacheBoutique[newIdx]=temp;
  localStorage.setItem('boutique_books',JSON.stringify(cacheBoutique));
  loadBoutique();
}

function deleteBook(idx){
  if(!confirm(`Supprimer "${cacheBoutique[idx].name}" ?`)) return;
  cacheBoutique.splice(idx,1);
  localStorage.setItem('boutique_books',JSON.stringify(cacheBoutique));
  toast('✓ Livre supprimé');
  loadBoutique();
}

// Toast
function toast(msg,isError=false){
  const t=document.createElement('div');
  t.className='toast '+(isError?'error':'');
  t.textContent=msg;
  document.body.appendChild(t);
  t.classList.add('show');
  setTimeout(()=>t.remove(),3000);
}

// Logout
document.getElementById('logoutBtn').addEventListener('click',()=>{
  localStorage.clear();
  window.location.reload();
});

// Launch
window.addEventListener('load',init);
</script>
</body>
</html>
