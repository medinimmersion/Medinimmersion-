<link rel="icon" href="https://pub-629428d185ca4960a0a73c850d32294b.r2.dev/company_83078/images/933a6647-1e04-4982-bc9f-b6d67608ce89.png">
<style>
:root{
  --green-deep:#0F3D26;--green:#1B5E3A;--green-soft:#1A4A33;
  --gold:#B8953A;--gold-light:#D4A843;--gold-pale:#F0E0A8;
  --cream:#FDFAF3;--ink:rgba(255,255,255,0.92);--ink-soft:rgba(255,255,255,0.6);--ink-faint:rgba(255,255,255,0.35);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:radial-gradient(120% 90% at 50% 0%,#15543A 0%,var(--green-deep) 55%,#0A2C1C 100%);color:var(--ink);display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent;}
.ar{font-family:'Amiri',serif;}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:0.85rem 1.1rem;flex-shrink:0;}
.persona{display:inline-flex;align-items:center;gap:0.5rem;background:rgba(212,168,67,0.12);border:1px solid rgba(212,168,67,0.35);color:#D4A843;border-radius:50px;padding:0.35rem 0.9rem;font-size:0.8rem;font-weight:700;margin-bottom:0.6rem;}
.persona .pe{font-size:1.1rem;}
.brand{display:flex;align-items:center;gap:0.6rem;text-decoration:none;color:var(--ink);}
.brand img{height:34px;background:var(--cream);border-radius:9px;padding:4px 7px;}
.brand-name{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.25rem;letter-spacing:0.01em;}
.brand-name span{color:var(--gold-light);}
.timer{display:flex;align-items:center;gap:0.45rem;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);padding:0.35rem 0.8rem;border-radius:50px;font-size:0.8rem;font-weight:600;color:var(--ink-soft);}
.timer svg{width:14px;height:14px;}
.timer .tleft{color:var(--gold-light);font-variant-numeric:tabular-nums;}

/* ── Settings chips ── */
.chips{display:flex;justify-content:center;gap:0.4rem;padding:0 1rem 0.25rem;flex-wrap:wrap;flex-shrink:0;}
.chip{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.13);color:var(--ink-soft);font-family:inherit;font-size:0.74rem;font-weight:600;padding:0.4rem 0.9rem;border-radius:50px;cursor:pointer;transition:all 0.2s;}
.chip.on{background:var(--gold);border-color:var(--gold);color:var(--green-deep);}
.chip:focus-visible{outline:2px solid var(--gold-light);outline-offset:2px;}
.chip-group{display:flex;gap:0.4rem;}
.chip-divider{width:1px;background:rgba(255,255,255,0.15);margin:0.3rem 0.2rem;}

/* ── Conversation ── */
main{flex:1;display:flex;flex-direction:column;min-height:0;}
#feed{flex:1;overflow-y:auto;padding:0.75rem 1.1rem 0.5rem;display:flex;flex-direction:column;gap:0.6rem;scroll-behavior:smooth;}
.msg{max-width:82%;padding:0.7rem 1rem;border-radius:18px;font-size:0.95rem;line-height:1.55;animation:pop 0.25s ease both;}
.msg.user{align-self:flex-end;background:var(--gold);color:var(--green-deep);border-bottom-right-radius:6px;font-weight:500;}
.msg.ai{align-self:flex-start;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-bottom-left-radius:6px;}
.msg.ai .ar{font-size:1.15em;color:var(--gold-pale);}
.msg.hint{align-self:center;background:none;border:none;color:var(--ink-faint);font-size:0.78rem;text-align:center;max-width:95%;padding:0.2rem;}
.msg.interim{align-self:flex-end;background:rgba(212,168,67,0.25);color:var(--gold-pale);border-bottom-right-radius:6px;font-style:italic;}
@keyframes pop{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── Orb zone ── */
.stage{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:0.55rem;padding:0.6rem 1rem calc(1.1rem + env(safe-area-inset-bottom));}
.status{font-size:0.82rem;font-weight:600;color:var(--ink-soft);letter-spacing:0.04em;min-height:1.2em;text-align:center;}
.status.listening{color:var(--gold-light);}
.status.speaking{color:#9FD9B4;}

.orb-wrap{position:relative;width:118px;height:118px;display:flex;align-items:center;justify-content:center;}
.ring{position:absolute;inset:0;transform:rotate(-90deg);}
.ring circle{fill:none;stroke-width:3.5;}
.ring .track{stroke:rgba(255,255,255,0.12);}
.ring .left{stroke:var(--gold-light);stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
.orb{width:88px;height:88px;border-radius:50%;border:none;cursor:pointer;position:relative;
  background:radial-gradient(circle at 32% 30%,#E8C775 0%,var(--gold-light) 35%,var(--gold) 70%,#8A6E26 100%);
  box-shadow:0 6px 30px rgba(212,168,67,0.45),inset 0 -4px 12px rgba(0,0,0,0.25);
  display:flex;align-items:center;justify-content:center;transition:transform 0.2s,box-shadow 0.3s;}
.orb:active{transform:scale(0.94);}
.orb:focus-visible{outline:3px solid var(--cream);outline-offset:4px;}
.orb svg{width:34px;height:34px;color:var(--green-deep);position:relative;z-index:2;}
.orb .halo{position:absolute;inset:-14px;border-radius:50%;border:2px solid rgba(212,168,67,0.5);opacity:0;}
body.listening .orb .halo{animation:halo 1.6s ease-out infinite;}
body.listening .orb{box-shadow:0 0 0 6px rgba(212,168,67,0.18),0 6px 36px rgba(212,168,67,0.6),inset 0 -4px 12px rgba(0,0,0,0.25);}
@keyframes halo{0%{opacity:0.8;transform:scale(0.85);}100%{opacity:0;transform:scale(1.35);}}
body.thinking .orb{animation:breathe 1.1s ease-in-out infinite;}
@keyframes breathe{0%,100%{filter:brightness(1);}50%{filter:brightness(1.25);}}
body.speaking .orb{background:radial-gradient(circle at 32% 30%,#5FBF8A 0%,#2E8B57 45%,var(--green) 75%,#0C3320 100%);box-shadow:0 6px 30px rgba(46,139,87,0.5),inset 0 -4px 12px rgba(0,0,0,0.3);}
body.speaking .orb svg{color:var(--cream);}

/* live mic bars */
.bars{position:absolute;inset:0;display:none;align-items:center;justify-content:center;gap:3px;z-index:2;}
body.listening .bars{display:flex;}
body.listening .orb svg{display:none;}
.bars i{width:4px;border-radius:3px;background:var(--green-deep);height:8px;transition:height 0.08s;}

.controls{display:flex;align-items:center;gap:1.4rem;}
.ctrl{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);transition:all 0.2s;}
.ctrl:hover{color:var(--ink);background:rgba(255,255,255,0.12);}
.ctrl:focus-visible{outline:2px solid var(--gold-light);outline-offset:2px;}
.ctrl svg{width:19px;height:19px;}
.ctrl.on{background:var(--gold);border-color:var(--gold);color:var(--green-deep);}
.hintline{font-size:0.72rem;color:var(--ink-faint);text-align:center;}

/* ── Login overlay ── */
.overlay{position:fixed;inset:0;background:rgba(10,33,21,0.92);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:1.25rem;z-index:50;}
.panel{background:var(--cream);color:#1A1A1A;border-radius:22px;padding:2rem 1.6rem;width:100%;max-width:380px;text-align:center;}
.panel .ar-line{font-family:'Amiri',serif;color:var(--gold);font-size:1.35rem;margin-bottom:0.6rem;}
.panel h1{font-family:'Cormorant Garamond',serif;color:var(--green-deep);font-size:1.9rem;margin-bottom:0.4rem;}
.panel p{font-size:0.88rem;color:#5A5247;margin-bottom:1.2rem;line-height:1.6;}
.panel input{width:100%;padding:0.85rem 1rem;border-radius:12px;border:1.5px solid #E2D9BE;background:#fff;font-family:inherit;font-size:0.95rem;margin-bottom:0.7rem;}
.panel input:focus{outline:2px solid var(--gold);border-color:var(--gold);}
.panel .err{display:none;background:#FDECEC;color:#B3261E;border:1px solid #F5C6C2;border-radius:10px;padding:0.6rem 0.9rem;font-size:0.82rem;margin-bottom:0.7rem;}
.panel button{width:100%;padding:0.9rem;border:none;border-radius:50px;background:var(--green);color:#fff;font-family:inherit;font-weight:700;font-size:0.95rem;cursor:pointer;transition:background 0.2s;}
.panel button:hover{background:var(--green-deep);}
.panel a{color:var(--green);font-size:0.82rem;}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>

<script>
/* ════════ KALAM — conversation vocale fluide ════════ */
const DAILY_SECONDS = 180;               // 3 min / jour
const $ = id => document.getElementById(id);

let token=null, student=null;
function PERSONA(){
  const f = (student?.gender||'').toLowerCase()==='femme';
  return f
    ? {name:'Oustaza Oum Adam',  short:'Oustaza', ar:'الأستاذة', emoji:'🧕🏽', gender:'femme'}
    : {name:'Oustaz Abou Adam', short:'Oustaz',  ar:'الأستاذ',  emoji:'🧔🏽', gender:'homme'};
}
let lang='fr', level='debutant';
let history=[];                           // {role, content}
let autoMode=true;
let recognition=null, recActive=false, manualStop=false, lastInterim='';
let audioCtx=null, analyser=null, micStream=null, rafId=null;
let currentAudio=null;
let secondsLeft=180, totalSeconds=180, unlimited=false, tickInt=null, started=false, consumeBuffer=0;

/* ── Quota géré par le serveur (défini par le gérant) ── */
async function loadQuota(){
  try{
    const r=await fetch('/api/oustaz/quota',{headers:{'Authorization':'Bearer '+token}});
    if(!r.ok) throw 0;
    const d=await r.json();
    unlimited=!!d.unlimited;
    totalSeconds=d.total>0?d.total:180;
    secondsLeft=unlimited?999999:d.remaining;
  }catch{ unlimited=false; totalSeconds=180; secondsLeft=180; }
  drawTimer();
}
function drawTimer(){
  if(unlimited){ $('timeLeft').textContent='∞'; $('ringLeft').style.strokeDashoffset='0'; return; }
  const m=Math.floor(Math.max(0,secondsLeft)/60), s=Math.max(0,secondsLeft)%60;
  $('timeLeft').textContent=`${m}:${String(s).padStart(2,'0')}`;
  const C=345.6, pct=Math.max(0,secondsLeft)/Math.max(1,totalSeconds);
  $('ringLeft').style.strokeDashoffset=String(C*(1-pct));
}
function startTick(){
  if(tickInt) return;
  tickInt=setInterval(()=>{
    if(!unlimited){ secondsLeft--; }
    consumeBuffer++;
    drawTimer();
    // Toutes les 10s, on enregistre la consommation côté serveur
    if(consumeBuffer>=10){ pushConsume(consumeBuffer); consumeBuffer=0; }
    if(!unlimited && secondsLeft<=0){ pushConsume(consumeBuffer); consumeBuffer=0; endOfQuota(); }
  },1000);
}
async function pushConsume(sec){
  if(!sec) return;
  try{ await fetch('/api/oustaz/quota/consume',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({seconds:sec})}); }catch{}
}
function stopTick(){
  clearInterval(tickInt); tickInt=null;
  if(consumeBuffer>0){ pushConsume(consumeBuffer); consumeBuffer=0; }
}
function endOfQuota(){
  stopTick(); stopListening(true); stopSpeaking();
  setStatus('Session terminée — à bientôt in shâ Allah !');
  addMsg('hint','Tu as utilisé tout ton temps Kalam. Contacte ton école pour en obtenir davantage 🌙');
}

/* ── Auth ── */
async function checkAuth(){
  token=localStorage.getItem('medin_token')||localStorage.getItem('studentToken');
  if(!token){ $('loginOverlay').style.display='flex'; return; }
  try{
    const r=await fetch('/api/member/me',{headers:{'Authorization':'Bearer '+token}});
    if(!r.ok) throw 0;
    student=await r.json();
    welcome();
  }catch{ $('loginOverlay').style.display='flex'; }
}
$('liBtn').onclick=async()=>{
  const id=$('liId').value.trim(), pwd=$('liPwd').value;
  const err=$('loginErr'); err.style.display='none';
  if(!id||!pwd){err.textContent='Email/WhatsApp et mot de passe requis.';err.style.display='block';return;}
  try{
    const body=id.includes('@')?{email:id,password:pwd}:{whatsapp:id,password:pwd};
    const r=await fetch('/api/member/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Identifiants incorrects.');
    token=d.token; localStorage.setItem('medin_token',token);
    student=d.student||null;
    $('loginOverlay').style.display='none';
    welcome();
  }catch(e){err.textContent=e.message;err.style.display='block';}
};
function welcome(){
  loadQuota();
  const p=PERSONA();
  $('personaEmoji').textContent=p.emoji;
  $('personaName').textContent=p.name;
  $('personaBadge').style.display='inline-flex';
  const name=student?.prenom||student?.kounia||'';
  addMsg('hint',`As-salamou alaykoum${name?' '+name:''} ! Je suis ${p.name}. Choisis ta langue et ton niveau, puis touche l'orbe doré pour parler avec moi.`);
}

/* ── UI helpers ── */
function setStatus(t,cls){ const s=$('status'); s.textContent=t; s.className='status'+(cls?' '+cls:''); }
function setBodyState(st){ document.body.className=st||''; }
function addMsg(kind,text){
  const d=document.createElement('div');
  d.className='msg '+kind;
  if(kind==='ai'){ d.innerHTML=text.replace(/([\u0600-\u06FF][^<]*)/g,'<span class="ar">$1</span>'); }
  else d.textContent=text;
  $('feed').appendChild(d);
  $('feed').scrollTop=$('feed').scrollHeight;
  return d;
}
let interimEl=null;
function showInterim(t){
  if(!interimEl){ interimEl=addMsg('interim',t); } else { interimEl.textContent=t; $('feed').scrollTop=$('feed').scrollHeight; }
}
function clearInterim(){ if(interimEl){interimEl.remove();interimEl=null;} }

/* ── Chips ── */
document.querySelectorAll('.chip.lang').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.chip.lang').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); lang=b.dataset.lang;
  if(recActive){ restartRecognition(); }
});
document.querySelectorAll('.chip.lvl').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.chip.lvl').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); level=b.dataset.lvl;
});
$('autoBtn').onclick=()=>{
  autoMode=!autoMode;
  $('autoBtn').classList.toggle('on',autoMode);
  $('hintline').textContent=autoMode?"Mode continu activé — la conversation s'enchaîne toute seule":"Mode continu désactivé — touche l'orbe à chaque tour";
};
let micMuted=false;
$('muteBtn').onclick=()=>{
  micMuted=!micMuted;
  $('muteBtn').classList.toggle('on',micMuted);
  if(micMuted){
    // Couper UNIQUEMENT l'écoute (pour ne plus capter les bruits / ta voix).
    // Kalam continue de parler et de répondre normalement.
    manualStop=true;
    stopListening(true);
    $('muteBtn').title='Micro coupé — touche pour réactiver';
    setStatus(lang==='ar'?'الميكروفون مغلق':'Micro coupé — Kalam continue de répondre');
  }else{
    manualStop=false;
    $('muteBtn').title='Couper le micro';
    // Si Kalam n'est pas en train de parler, on réactive l'écoute
    if(document.body.className!=='speaking'){ startListening(); }
  }
};

/* ── Micro + niveau sonore ── */
async function ensureMic(){
  // Sur Android, garder un flux getUserMedia ouvert empêche la reconnaissance
  // vocale de capter le son. On demande donc juste l'autorisation, puis on
  // libère immédiatement le micro pour le laisser à SpeechRecognition.
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    stream.getTracks().forEach(t=>t.stop());   // on relâche tout de suite
    return true;
  }catch(e){
    addMsg('hint','Micro refusé. Autorise le micro dans les réglages de ton navigateur pour utiliser Kalam.');
    setStatus('Micro non autorisé');
    return false;
  }
}
function animateBars(){
  if(!analyser) return;
  const data=new Uint8Array(analyser.frequencyBinCount);
  const bars=$('bars').children;
  const loop=()=>{
    analyser.getByteFrequencyData(data);
    for(let i=0;i<bars.length;i++){
      const v=data[i*3+2]||0;
      bars[i].style.height=Math.max(6,(v/255)*36)+'px';
    }
    rafId=requestAnimationFrame(loop);
  };
  loop();
}
function stopBars(){ cancelAnimationFrame(rafId); }

/* ── Reconnaissance vocale ── */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function langCode(){ return lang==='ar'?'ar-SA':lang==='en'?'en-US':'fr-FR'; }
function startListening(){
  if(!SR){ addMsg('hint','Ton navigateur ne supporte pas la reconnaissance vocale. Utilise Chrome.'); return; }
  if(secondsLeft<=0){ endOfQuota(); return; }
  manualStop=false;
  recognition=new SR();
  recognition.lang=langCode();
  recognition.interimResults=true;
  recognition.continuous=false;
  recognition.maxAlternatives=1;

  recognition.onstart=()=>{ recActive=true; setBodyState('listening'); setStatus(lang==='ar'?'استمع إليك…':'Je t\'écoute…','listening'); animateBars(); startTick(); if(!started){started=true;} };
  recognition.onresult=(ev)=>{
    let interim='', final='';
    for(let i=ev.resultIndex;i<ev.results.length;i++){
      const t=ev.results[i][0].transcript;
      if(ev.results[i].isFinal) final+=t; else interim+=t;
    }
    if(interim){ showInterim(interim); lastInterim=interim; }
    if(final){ clearInterim(); lastInterim=''; addMsg('hint','🎙️ capté (final): '+final.trim()); userSaid(final.trim()); }
  };
  recognition.onerror=(ev)=>{
    recActive=false; stopBars();
    if(ev.error==='no-speech'){ if(autoMode&&!manualStop&&secondsLeft>0){ try{recognition.stop();}catch{} setTimeout(()=>startListening(),250); } else { setBodyState(''); setStatus('Je n\'ai rien entendu — touche l\'orbe'); } return; }
    if(ev.error==='not-allowed'){ setBodyState(''); setStatus('Micro non autorisé'); addMsg('hint','Autorise le micro pour parler avec Kalam.'); return; }
    setBodyState(''); setStatus('Petit souci de micro — touche l\'orbe pour réessayer');
  };
  recognition.onend=()=>{
    recActive=false; stopBars();
    if(lastInterim && lastInterim.trim()){ const t=lastInterim.trim(); lastInterim=''; clearInterim(); addMsg('hint','🎙️ capté (fin): '+t); userSaid(t); return; }
    if(document.body.className==='listening') setBodyState('');
  };
  try{ recognition.start(); }catch{}
}
function stopListening(silent){
  manualStop=true;
  try{ recognition&&recognition.stop(); }catch{}
  recActive=false; stopBars(); stopTick();
  if(!silent) setBodyState('');
}
function restartRecognition(){ stopListening(true); setTimeout(()=>startListening(),200); }

/* ── Tour de parole ── */
async function userSaid(text){
  if(!text){ addMsg('hint','⚠️ texte vide, rien à envoyer'); return; }
  addMsg('hint','📤 envoi à l\'IA…');
  stopListening(true);
  addMsg('user',text);
  history.push({role:'user',content:text});
  setBodyState('thinking'); setStatus(PERSONA().short+' réfléchit…');
  try{
    const r=await fetch('/api/student/oustaz/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({message:text,history:history.slice(-12),lang,level,student_name:student?.prenom||student?.kounia||null,gender:PERSONA().gender,persona:PERSONA().name})
    });
    addMsg('hint','📥 réponse serveur: '+r.status);
    const d=await r.json();
    if(!r.ok) throw new Error((d.error||'Erreur IA')+' '+(d.detail||''));
    const reply=d.response||'…';
    history.push({role:'assistant',content:reply});
    addMsg('ai',reply);
    await speak(reply);
  }catch(e){
    setBodyState(''); setStatus('Erreur — touche l\'orbe pour reprendre');
    addMsg('hint',e.message);
  }
}

/* ── Synthèse vocale : serveur (naturelle) → fallback navigateur ── */
async function speak(text){
  setBodyState('speaking'); setStatus(lang==='ar'?PERSONA().ar+' يتكلم…':PERSONA().short+' parle…','speaking');
  stopTick();
  const done=()=>{
    setBodyState(''); 
    if(secondsLeft<=0){ endOfQuota(); return; }
    if(micMuted){ setStatus(lang==='ar'?'الميكروفون مغلق':'Micro coupé — touche le micro pour parler'); return; }
    if(autoMode){ setTimeout(()=>startListening(),350); }
    else setStatus('À toi — touche l\'orbe');
  };
  /* 1) Voix serveur (OpenAI) */
  try{
    const r=await fetch('/api/oustaz/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,lang,gender:PERSONA().gender,persona:PERSONA().name})});
    if(r.ok){
      const blob=await r.blob();
      currentAudio=new Audio(URL.createObjectURL(blob));
      currentAudio.onended=done; currentAudio.onerror=done;
      await currentAudio.play();
      return;
    }
  }catch{}
  /* 2) Fallback navigateur */
  if('speechSynthesis' in window){
    const u=new SpeechSynthesisUtterance(text);
    u.lang=langCode(); u.rate=0.95;
    const fem = PERSONA().gender==='femme';
    u.pitch = fem ? 1.12 : 0.92;
    const voices=speechSynthesis.getVoices().filter(v=>v.lang.startsWith(langCode().slice(0,2)));
    const femRx=/female|femme|woman|salma|amira|hoda|laila|zira|denise|audrey|marie|julie|amelie|chantal|charlotte|aria/i;
    const malRx=/male(?!e)|homme|\bman\b|tarik|naayf|hamed|majed|paul|henri|nicolas|thomas|george|guy/i;
    const byGender = voices.find(v=> fem ? femRx.test(v.name) : malRx.test(v.name));
    const quality  = voices.find(v=>/natural|enhanced|premium/i.test(v.name));
    const v = byGender || quality || voices[0];
    if(v) u.voice=v;
    u.onend=done; u.onerror=done;
    speechSynthesis.speak(u);
  } else done();
}
function stopSpeaking(){
  try{ currentAudio&&currentAudio.pause(); }catch{}
  try{ window.speechSynthesis&&speechSynthesis.cancel(); }catch{}
}

/* ── Orbe ── */
$('orb').onclick=async()=>{
  if(secondsLeft<=0){ endOfQuota(); return; }
  if(document.body.className==='speaking'){ stopSpeaking(); startListening(); return; }
  if(recActive){ stopListening(); setStatus('En pause — touche l\'orbe pour reprendre'); return; }
  const ok=await ensureMic(); if(!ok) return;
  if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();
  startListening();
};

checkAuth();

/* Saisie texte de secours (si le micro ne capte pas) */
(function(){
  const ti=document.getElementById('textInput'), sb=document.getElementById('sendText');
  function send(){ const v=ti.value.trim(); if(!v)return; ti.value=''; try{stopListening(true);}catch{} userSaid(v); }
  if(sb) sb.onclick=send;
  if(ti) ti.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); send(); } });
})();
</script>
