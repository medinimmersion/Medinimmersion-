<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test Personnage</title>
  <style>body { margin: 0; overflow: hidden; background: #888; }</style>
  <script type="importmap">
    {
      "imports": {
        "three": "/node_modules/three/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';
    import { Character } from './js/entities/Character.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd8d0c0);

    const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 1.1, 3.2);
    camera.lookAt(0, 0.95, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x887766, 0.9));
    const sun = new THREE.DirectionalLight(0xfff0dd, 1.6);
    sun.position.set(2, 4, 3);
    sun.castShadow = true;
    scene.add(sun);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0xc8bca8 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Abdallah — qamis bleu foncé comme la référence, vu de FACE
    const front = new Character({
      robeColor: 0x2b3a5c, accentColor: 0xd8c6a1, skinColor: 0xce9f79,
      headwear: 'ghutra', headwearColor: 0xf3ecd8,
    });
    front.setPosition(-0.55, 0, 0);
    front.faceYaw(0);
    scene.add(front.object3D);

    // Même personnage vu de DOS
    const back = new Character({
      robeColor: 0x2b3a5c, accentColor: 0xd8c6a1, skinColor: 0xce9f79,
      headwear: 'ghutra', headwearColor: 0xf3ecd8,
    });
    back.setPosition(0.55, 0, 0);
    back.faceYaw(Math.PI);
    scene.add(back.object3D);

    renderer.render(scene, camera);
    let t = 0;
    setInterval(() => {
      t += 1 / 30;
      front.update(1 / 30, { moving: false });
      back.update(1 / 30, { moving: false });
      renderer.render(scene, camera);
    }, 33);
  </script>
</body>
</html>
