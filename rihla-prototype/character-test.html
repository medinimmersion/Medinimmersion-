<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Personnage de référence — RYHLA</title>
  <style>body { margin: 0; overflow: hidden; background: #1a1410; }</style>
  <script type="importmap">
    {
      "imports": {
        "three": "/node_modules/three/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';
    import { Character } from './js/entities/Character.js';

    // Présentation cinématographique — Document 064 : lumière chaude,
    // ombres douces, légère lumière de contour (style Journey / Mirage).
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2a2018);
    scene.fog = new THREE.Fog(0x2a2018, 8, 18);

    const camera = new THREE.PerspectiveCamera(32, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 1.25, 4.4);
    camera.lookAt(0, 0.92, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    document.body.appendChild(renderer.domElement);

    // Clé chaude (soleil de fin d'après-midi).
    const key = new THREE.DirectionalLight(0xffd9a8, 2.4);
    key.position.set(2.5, 3.5, 2.5);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.radius = 6;
    key.shadow.bias = -0.0008;
    scene.add(key);

    // Remplissage doux, légèrement froid (ciel).
    const fill = new THREE.DirectionalLight(0x9db8d8, 0.5);
    fill.position.set(-3, 2, 1.5);
    scene.add(fill);

    // Lumière de contour (rim) derrière les personnages.
    const rim = new THREE.DirectionalLight(0xffe8c8, 1.6);
    rim.position.set(-1.5, 2.5, -3.5);
    scene.add(rim);

    scene.add(new THREE.AmbientLight(0x584838, 0.7));

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(9, 48),
      new THREE.MeshStandardMaterial({ color: 0xb9a888, roughness: 0.9 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Trois vues du personnage de référence (Abdallah, bleu nuit) :
    // face, trois-quarts dos, et le joueur en beige.
    const lineup = [
      { opts: { robeColor: 0x2b3a5c, accentColor: 0xd8c6a1, skinColor: 0xce9f79, headwear: 'ghutra', headwearColor: 0xf3ecd8 }, x: 0, yaw: 0 },
      { opts: { robeColor: 0x2b3a5c, accentColor: 0xd8c6a1, skinColor: 0xce9f79, headwear: 'ghutra', headwearColor: 0xf3ecd8 }, x: 1.25, yaw: Math.PI - 0.5 },
      { opts: { robeColor: 0xcbb489, accentColor: 0x8a7350, skinColor: 0xd8b48c, headwear: 'ghutra', headwearColor: 0xf3ecd8 }, x: -1.25, yaw: 0.35 },
    ];

    const chars = [];
    for (const item of lineup) {
      const c = new Character(item.opts);
      c.setPosition(item.x, 0, 0);
      c.faceYaw(item.yaw);
      scene.add(c.object3D);
      chars.push(c);
    }

    renderer.render(scene, camera);
    setInterval(() => {
      for (const c of chars) c.update(1 / 30, { moving: false });
      renderer.render(scene, camera);
    }, 33);
  </script>
</body>
</html>
