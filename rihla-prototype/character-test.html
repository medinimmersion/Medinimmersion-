<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Design des personnages — RIHLA</title>
  <style>body { margin: 0; overflow: hidden; background: #888; }</style>
  <script type="importmap">
    {
      "imports": {
        "three": "/node_modules/three/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';
    import { Character } from './js/entities/Character.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd8d0c0);

    const camera = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 1.1, 4.6);
    camera.lookAt(0, 0.95, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x887766, 0.9));
    const sun = new THREE.DirectionalLight(0xfff0dd, 1.6);
    sun.position.set(2, 4, 3);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    scene.add(sun);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({ color: 0xc8bca8 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // La distribution complète de RIHLA, de gauche à droite :
    const lineup = [
      // Joueur — qamis beige
      { opts: { robeColor: 0xcbb489, accentColor: 0x8a7350, skinColor: 0xd8b48c, headwear: 'ghutra', headwearColor: 0xf3ecd8 }, x: -2.2, yaw: 0 },
      // Abou Adam — vert profond, ghutra crème
      { opts: { robeColor: 0x33513a, accentColor: 0xc9a44c, skinColor: 0xc89468, headwear: 'ghutra', headwearColor: 0xf3ecd8 }, x: -1.1, yaw: 0 },
      // Abdallah — bleu nuit (référence concept art), vu de FACE
      { opts: { robeColor: 0x2b3a5c, accentColor: 0xd8c6a1, skinColor: 0xce9f79, headwear: 'ghutra', headwearColor: 0xf3ecd8 }, x: 0, yaw: 0 },
      // Abdallah vu de DOS (drapé en V)
      { opts: { robeColor: 0x2b3a5c, accentColor: 0xd8c6a1, skinColor: 0xce9f79, headwear: 'ghutra', headwearColor: 0xf3ecd8 }, x: 1.1, yaw: Math.PI },
      // Personnage féminin — abaya + khimar brun foncé (référence concept art)
      { opts: { robeColor: 0x3d2b1f, accentColor: 0x3d2b1f, skinColor: 0xd8b48c, headwear: null, gender: 'female' }, x: 2.2, yaw: 0 },
    ];

    const chars = [];
    for (const item of lineup) {
      const c = new Character(item.opts);
      c.setPosition(item.x, 0, 0);
      c.faceYaw(item.yaw);
      scene.add(c.object3D);
      chars.push(c);
    }

    renderer.render(scene, camera);
    setInterval(() => {
      for (const c of chars) c.update(1 / 30, { moving: false });
      renderer.render(scene, camera);
    }, 33);
  </script>
</body>
</html>
