<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Réinitialiser le mot de passe — Médin'Immersion</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="https://pub-629428d185ca4960a0a73c850d32294b.r2.dev/company_83078/images/933a6647-1e04-4982-bc9f-b6d67608ce89.png">
<style>
:root{--green:#1B5E3A;--green-deep:#0F3D26;--gold:#B8953A;--gold-light:#D4A843;--cream:#FDFAF3;--beige:#EDE4C8;--text:#1A1A1A;--text-muted:#5A5247;--white:#FFFFFF;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--green-deep);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden;}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 40%,rgba(184,149,58,0.1),transparent 60%);}
.box{background:var(--white);border-radius:24px;padding:2.75rem 2.5rem;width:100%;max-width:460px;position:relative;box-shadow:0 24px 80px rgba(0,0,0,0.3);}
.logo{text-align:center;margin-bottom:1.5rem;}
.logo img{height:54px;}
.ar{font-family:'Amiri',serif;font-size:1.1rem;color:var(--gold-light);direction:rtl;text-align:center;margin-bottom:1.5rem;}
h1{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:700;color:var(--green-deep);margin-bottom:0.3rem;text-align:center;}
.sub{color:var(--text-muted);font-size:0.85rem;text-align:center;margin-bottom:2rem;line-height:1.6;}
/* Tabs */
.tabs{display:flex;background:var(--cream);border-radius:12px;padding:4px;margin-bottom:1.75rem;gap:4px;}
.tab-btn{flex:1;padding:0.55rem;border:none;background:transparent;border-radius:9px;font-family:inherit;font-size:0.82rem;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all 0.2s;}
.tab-btn.active{background:var(--white);color:var(--green);box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
/* Fields */
.fg{margin-bottom:1.1rem;}
.fg label{display:block;font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:0.35rem;}
.fg input{width:100%;padding:0.72rem 1rem;border:1.5px solid var(--beige);border-radius:11px;font-family:inherit;font-size:0.9rem;color:var(--text);background:var(--cream);outline:none;transition:border-color 0.2s,background 0.2s;}
.fg input:focus{border-color:var(--green);background:var(--white);}
.btn{width:100%;background:var(--green);color:var(--white);border:none;padding:0.85rem;border-radius:50px;font-family:inherit;font-size:0.92rem;font-weight:700;cursor:pointer;transition:background 0.2s;margin-top:0.25rem;}
.btn:hover{background:var(--green-deep);}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.err{background:#FEF2F2;border:1px solid #FCA5A5;color:#B91C1C;padding:0.65rem 1rem;border-radius:10px;font-size:0.82rem;margin-bottom:1rem;display:none;}
.ok{background:#F0FDF4;border:1px solid #86EFAC;color:#15803D;padding:0.65rem 1rem;border-radius:10px;font-size:0.82rem;margin-bottom:1rem;display:none;}
.back{text-align:center;font-size:0.82rem;color:var(--text-muted);margin-top:1.25rem;}
.back a{color:var(--green);font-weight:600;text-decoration:none;}
/* New password panel */
#panelNew{display:none;}
.pw-rule{font-size:0.78rem;color:var(--text-muted);margin-top:0.3rem;}
</style></head><body>
<div class="box">
  <div class="logo"><img src="https://pub-629428d185ca4960a0a73c850d32294b.r2.dev/company_83078/images/933a6647-1e04-4982-bc9f-b6d67608ce89.png" alt="Médin'Immersion"></div>
  <div class="ar">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>

  <!-- REQUEST RESET -->
  <div id="panelRequest">
    <h1>Mot de passe oublié ?</h1>
    <p class="sub">Entrez votre WhatsApp ou email. Vous recevrez un lien de réinitialisation.</p>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchMethod('email',this)">✉️ Email</button>
      <button class="tab-btn" onclick="switchMethod('whatsapp',this)">📱 WhatsApp</button>
    </div>
    <div class="err" id="reqErr"></div>
    <div class="ok" id="reqOk"></div>
    <div class="tab-panel active" id="tab-email">
      <div class="fg"><label>Adresse email</label><input type="email" id="reqEmail" placeholder="votre@email.com"></div>
    </div>
    <div class="tab-panel" id="tab-whatsapp">
      <div class="fg"><label>Numéro WhatsApp</label><input type="tel" id="reqWA" placeholder="+33 6 00 00 00 00"></div>
    </div>
    <button class="btn" id="reqBtn" onclick="doRequest()">Envoyer le lien →</button>
    <div class="back"><a href="/espace-eleve">← Retour à la connexion</a></div>
  </div>

  <!-- NEW PASSWORD (token in URL) -->
  <div id="panelNew">
    <h1>Nouveau mot de passe</h1>
    <p class="sub">Choisissez votre nouveau mot de passe.</p>
    <div class="err" id="newErr"></div>
    <div class="ok" id="newOk"></div>
    <div class="fg"><label>Nouveau mot de passe</label><input type="password" id="newPwd" placeholder="Minimum 6 caractères"><div class="pw-rule">Au moins 6 caractères.</div></div>
    <div class="fg"><label>Confirmer le mot de passe</label><input type="password" id="newPwd2" placeholder="Répétez le mot de passe"></div>
    <button class="btn" id="newBtn" onclick="doNewPassword()">Enregistrer →</button>
  </div>
</div>

<script>
let method='email';
const urlToken=new URLSearchParams(location.search).get('token');
if(urlToken){
  document.getElementById('panelRequest').style.display='none';
  document.getElementById('panelNew').style.display='block';
}

function switchMethod(m,btn){
  method=m;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+m).classList.add('active');
}

async function doRequest(){
  const err=document.getElementById('reqErr');
  const ok=document.getElementById('reqOk');
  err.style.display='none';ok.style.display='none';
  const val=method==='email'?document.getElementById('reqEmail').value.trim():document.getElementById('reqWA').value.trim();
  if(!val){err.textContent='Veuillez remplir ce champ.';err.style.display='block';return;}
  const btn=document.getElementById('reqBtn');
  btn.textContent='Envoi…';btn.disabled=true;
  try{
    const body=method==='email'?{email:val}:{whatsapp:val};
    const res=await fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Erreur.');
    ok.textContent='✓ Lien envoyé ! Vérifiez votre '+(method==='email'?'boîte email':'WhatsApp')+'.';
    ok.style.display='block';
    btn.textContent='Lien envoyé ✓';
  }catch(e){
    err.textContent=e.message;err.style.display='block';
    btn.textContent='Envoyer le lien →';btn.disabled=false;
  }
}

async function doNewPassword(){
  const err=document.getElementById('newErr');
  const ok=document.getElementById('newOk');
  err.style.display='none';ok.style.display='none';
  const pwd=document.getElementById('newPwd').value.trim();
  const pwd2=document.getElementById('newPwd2').value.trim();
  if(!pwd||pwd.length<6){err.textContent='Le mot de passe doit faire au moins 6 caractères.';err.style.display='block';return;}
  if(pwd!==pwd2){err.textContent='Les mots de passe ne correspondent pas.';err.style.display='block';return;}
  const btn=document.getElementById('newBtn');
  btn.textContent='Enregistrement…';btn.disabled=true;
  try{
    const res=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:urlToken,password:pwd})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Lien invalide ou expiré.');
    ok.textContent='✓ Mot de passe modifié ! Redirection…';ok.style.display='block';
    btn.textContent='Enregistré ✓';
    setTimeout(()=>location.href='/espace-eleve.html',2000);
  }catch(e){
    err.textContent=e.message;err.style.display='block';
    btn.textContent='Enregistrer →';btn.disabled=false;
  }
}
</script>
</body></html>
